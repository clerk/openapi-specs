            properties:
              admin_delete_enabled:
                type: boolean
                description: Whether admins can delete organizations
                default: true
              creator_role:
                type: string
                description: Role key assigned to organization creators
              domains_default_role:
                type: string
                description: Default role key for domain-based membership
              domains_enabled:
                type: boolean
                description: Whether organization domains are enabled
                default: false
              domains_enrollment_modes:
                type: array
                description: Domain enrollment modes. manual_invitation is always included.
                items:
                  type: string
                  enum:
                    - manual_invitation
                    - automatic_invitation
                    - automatic_suggestion
              enabled:
                type: boolean
                description: Whether organizations are enabled
                default: false
              force_organization_selection:
                type: boolean
                description: Require users to select an organization
                default: false
              initial_role_set_key:
                type: string
                description: Key of the initial role set for new organizations
