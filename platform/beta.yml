        '422':
          $ref: '#/components/responses/UnprocessableEntity'
components:
  securitySchemes:
    platform_api_access_token:
      type: http
      scheme: bearer
      description: Platform API access token.
  schemas:
    PlatformApplicationInstance:
      title: Application Instance
      description: Represents an instance (environment) within a Clerk application. Each application can have multiple instances, typically one for development and one for production.
      type: object
      additionalProperties: false
      properties:
        instance_id:
          type: string
          description: The unique identifier for this instance. Use this ID when making API calls that target a specific instance.
          example: ins_2abc123def456
        environment_type:
          type: string
          description: The environment type of the instance. Determines whether this instance is used for development/testing or production workloads.
          enum:
            - development
            - production
          example: production
        secret_key:
          type: string
          description: The secret key for authenticating server-side API requests to this instance. Keep this value secure and never expose it in client-side code.
          example: sk_live_abc123...
          x-sensitive: true
        publishable_key:
          type: string
          description: The publishable key for this instance. Safe to include in client-side code and used to initialize Clerk SDKs in the browser.
          example: pk_live_abc123...
      required:
        - instance_id
        - environment_type
    PlatformApplicationResponse:
      type: object
      additionalProperties: false
      properties:
        application_id:
          type: string
          description: The ID of the application.
        name:
          type: string
          description: The name of the application.
        instances:
          type: array
          description: List of instances associated with this application.
          items:
            $ref: '#/components/schemas/PlatformApplicationInstance'
      required:
        - application_id
        - name
        - instances
    PlatformListApplicationsResponse:
      type: array
      items:
        $ref: '#/components/schemas/PlatformApplicationResponse'
      minItems: 0
    ClerkError:
      type: object
      properties:
        message:
          type: string
        long_message:
          type: string
        code:
          type: string
        meta:
          type: object
      required:
        - message
        - long_message
        - code
    ClerkErrors:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ClerkError'
        meta:
          type: object
        clerk_trace_id:
          type: string
      required:
        - errors
    PlatformCreateApplicationRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: The name of the application.
        domain:
          type: string
          description: The domain for the application (optional).
        proxy_path:
          type: string
          description: Custom proxy path for provider domains (e.g., "/__clerk"). Must start with a leading slash and be a single path segment. Defaults to "/__clerk" if not provided.
        environment_types:
          type: array
          items:
            type: string
          description: List of environment types to create instances for. Accepted values are "development" and "production". Defaults to "development" if not provided.
        template:
          type: string
          description: Application template to use for configuring the application (e.g., "b2b-saas", "b2c-saas", "waitlist").
      required:
        - name
    PlatformDeletedObjectResponse:
      type: object
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          description: Whether the object was deleted.
        object:
          type: string
          example: deleted
        id:
          type: string
          description: The ID of the deleted resource.
      required:
        - deleted
        - object
        - id
    PlatformUpdateApplicationRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: The name of the application.
    PlatformUpdateApplicationDomainRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: The domain name.
        proxy_path:
          type: string
          description: Optional proxy path for provider domains.
      required:
        - name
    PlatformCNameTarget:
      type: object
      additionalProperties: false
      properties:
        host:
          type: string
        value:
          type: string
        required:
          type: boolean
      required:
        - host
        - value
        - required
    PlatformDomainApplicationSummary:
      type: object
      additionalProperties: false
      properties:
        object:
          type: string
          enum:
            - application
        id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - object
        - id
        - created_at
        - updated_at
    PlatformDomainInstanceSummary:
      type: object
      additionalProperties: false
      properties:
        object:
          type: string
          enum:
            - instance
        id:
          type: string
        environment_type:
          type: string
          description: Instance environment type.
          enum:
            - production
            - development
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - object
        - id
        - environment_type
        - created_at
        - updated_at
    PlatformDomainResponse:
      type: object
      additionalProperties: false
      properties:
        object:
          type: string
          enum:
            - domain
        id:
          type: string
          description: The ID of the domain.
        name:
          type: string
          description: The domain name.
        is_satellite:
          type: boolean
          description: Whether this is a satellite domain.
        is_provider_domain:
          type: boolean
          description: Whether this is a provider domain.
        frontend_api_url:
          type: string
          description: The frontend API URL.
        development_origin:
          type: string
          description: The development origin.
        accounts_portal_url:
          type: string
          description: The accounts portal URL.
        proxy_url:
          type: string
          description: The proxy URL.
        cname_targets:
          type: array
          items:
            $ref: '#/components/schemas/PlatformCNameTarget'
          description: |
            CNAME targets for the domain. Omitted for development domains, which do not use custom-domain DNS setup.
        created_at:
          type: string
          format: date-time
          description: When the domain was created.
        updated_at:
          type: string
          format: date-time
          description: When the domain was last updated.
        application:
          $ref: '#/components/schemas/PlatformDomainApplicationSummary'
          description: Included on workspace-wide domain endpoints (`GET /platform/domains`, `GET /platform/domains/{domainIDOrName}`).
        instance:
          $ref: '#/components/schemas/PlatformDomainInstanceSummary'
          description: Included on workspace-wide domain endpoints (`GET /platform/domains`, `GET /platform/domains/{domainIDOrName}`).
      required:
        - object
        - id
        - name
        - frontend_api_url
        - development_origin
        - created_at
        - updated_at
    PlatformListApplicationDomainsResponse:
      title: List Application Domains Response
      description: A paginated list of application domains.
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          description: The list of application domains.
          items:
            $ref: '#/components/schemas/PlatformDomainResponse'
        total_count:
          type: integer
          format: int64
          description: The total number of application domains for the application.
          example: 2
      required:
        - data
        - total_count
    PlatformCreateApplicationDomainRequest:
      type: object
      additionalProperties: false
      properties:
        name:
