      operationId: PlatformListInstanceUsers
      x-speakeasy-group: platform
      x-speakeasy-name-override: listInstanceUsers
      tags:
        - Users
      summary: List instance users
      description: |
        List all users for an application instance.

        The `envOrInsID` parameter can be either an environment type (e.g., "development", "production")
        or an instance ID.

        Use the `query` parameter to filter users by searching across email addresses, phone numbers,
        usernames, web3 wallets, user IDs, first names, and last names.

        Use the `order_by` parameter to sort the results. Prefix with `+` for ascending or `-` for descending order.
        Valid fields: `created_at`, `updated_at`, `last_sign_in_at`, `last_active_at`, `email_address`, `first_name`,
        `last_name`, `username`, `phone_number`, `web3_wallet`. Default is `-created_at` (most recent first).

        Requires the `users:read` scope.
      security:
        - platform_api_access_token: []
      parameters:
        - name: applicationID
          in: path
          description: Application ID.
          required: true
          schema:
            type: string
        - name: envOrInsID
          in: path
          description: |
            Environment type (e.g., "development", "production") or instance ID.
          required: true
          schema:
            type: string
        - name: query
          in: query
          description: |
            A search query to filter users. Searches across email addresses, phone numbers,
            usernames, web3 wallets, user IDs, first names, and last names.
          required: false
          schema:
            type: string
        - name: order_by
          in: query
          description: |
            Field to order results by. Prefix with `+` for ascending or `-` for descending order.
            Valid fields: `created_at`, `updated_at`, `last_sign_in_at`, `last_active_at`, `email_address`,
            `first_name`, `last_name`, `username`, `phone_number`, `web3_wallet`.
          required: false
          schema:
            type: string
            default: '-created_at'
        - name: limit
          in: query
          description: Number of results to return per page (1-500, default 10).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 10
        - name: offset
          in: query
          description: Number of results to skip for pagination.
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Users retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformListInstanceUsersResponse'
        '400':
          $ref: '#/components/responses/ClerkErrors'
        '401':
