        directory_id:
          type: string
          description: |
            The ID of the SCIM directory the user is provisioned from.
        directory_enabled:
          type: boolean
          description: |
            Whether the SCIM directory is currently enabled. Omitted when false.
        external_id:
          type: string
          nullable: true
          description: |
            The user's external ID as reported by the SCIM directory, if any.
      required:
        - directory_id
        - external_id
    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        object:
          type: string
          description: |
            String representing the object's type. Objects of the same type share the same value.
          enum:
            - user
        external_id:
          nullable: true
          type: string
        primary_email_address_id:
          nullable: true
          type: string
        primary_phone_number_id:
          nullable: true
          type: string
        primary_web3_wallet_id:
          nullable: true
          type: string
        username:
          nullable: true
          type: string
        first_name:
          nullable: true
          type: string
        last_name:
          nullable: true
          type: string
        locale:
          nullable: true
          type: string
        profile_image_url:
          type: string
          deprecated: true
        image_url:
          type: string
        has_image:
          type: boolean
        public_metadata:
          type: object
          additionalProperties: true
        private_metadata:
          nullable: true
          type: object
          additionalProperties: true
        unsafe_metadata:
          type: object
          additionalProperties: true
        email_addresses:
          type: array
          items:
            $ref: '#/components/schemas/EmailAddress'
        phone_numbers:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumber'
        web3_wallets:
          type: array
          items:
            $ref: '#/components/schemas/Web3Wallet'
        passkeys:
          type: array
          items:
            $ref: '#/components/schemas/Passkey'
        password_enabled:
          type: boolean
        two_factor_enabled:
          type: boolean
        totp_enabled:
          type: boolean
        backup_code_enabled:
          type: boolean
        mfa_enabled_at:
          type: integer
          format: int64
          description: |
            Unix timestamp of when MFA was last enabled for this user. It should be noted that this field is not nullified if MFA is disabled.
          nullable: true
        mfa_disabled_at:
          type: integer
          format: int64
          description: |
            Unix timestamp of when MFA was last disabled for this user. It should be noted that this field is not nullified if MFA is enabled again.
          nullable: true
        password_last_updated_at:
          type: integer
          format: int64
          description: |
            Unix timestamp of when the user's password was last updated.
          nullable: true
        external_accounts:
          type: array
          items:
            $ref: '#/components/schemas/ExternalAccountWithVerification'
        saml_accounts:
          type: array
          items:
            $ref: '#/components/schemas/SAMLAccount'
        enterprise_accounts:
          type: array
          items:
            $ref: '#/components/schemas/EnterpriseAccount'
        organization_memberships:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationMembership'
        last_sign_in_at:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix timestamp of last sign-in.
        banned:
          type: boolean
          description: |
            Flag to denote whether user is banned or not.
        locked:
          type: boolean
          description: |
            Flag to denote whether user is currently locked, i.e. restricted from signing in or not.
        deprovisioned:
          type: boolean
          description: |
            Flag to denote whether user has been deprovisioned and is restricted from signing in.
        lockout_expires_in_seconds:
          type: integer
          format: int64
          nullable: true
          description: |
            The number of seconds remaining until the lockout period expires for a locked user. A null value for a locked user indicates that lockout never expires.
        verification_attempts_remaining:
          type: integer
          format: int64
          nullable: true
          description: |
            The number of verification attempts remaining until the user is locked. Null if account lockout is not enabled. Note: if a user is locked explicitly via the Backend API, they may still have verification attempts remaining.
        updated_at:
          type: integer
          format: int64
          description: |
            Unix timestamp of last update.
        created_at:
          type: integer
          format: int64
          description: |
            Unix timestamp of creation.
        delete_self_enabled:
          type: boolean
          description: |
            If enabled, user can delete themselves via FAPI.
        create_organization_enabled:
          type: boolean
          description: |
            If enabled, user can create organizations via FAPI.
        create_organizations_limit:
          type: integer
          description: |
            The maximum number of organizations the user can create. 0 means unlimited.
          nullable: true
        last_active_at:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix timestamp of the latest session activity, with day precision.
          example: 1700690400000
        legal_accepted_at:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix timestamp of when the user accepted the legal requirements.
          example: 1700690400000
        bypass_client_trust:
          type: boolean
          description: When set to `true`, the user will bypass client trust checks during sign-in.
          default: false
        scim:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SCIMUserMetadata'
      required:
        - id
        - object
        - username
        - first_name
        - last_name
        - has_image
        - primary_email_address_id
        - primary_phone_number_id
        - primary_web3_wallet_id
        - password_enabled
        - two_factor_enabled
        - totp_enabled
        - backup_code_enabled
        - email_addresses
        - phone_numbers
        - web3_wallets
        - passkeys
        - external_accounts
        - saml_accounts
        - enterprise_accounts
        - public_metadata
        - external_id
        - last_sign_in_at
        - banned
        - locked
        - lockout_expires_in_seconds
        - verification_attempts_remaining
        - created_at
        - updated_at
        - delete_self_enabled
        - create_organization_enabled
        - last_active_at
        - mfa_enabled_at
        - mfa_disabled_at
        - legal_accepted_at
