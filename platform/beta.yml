      example:
        $schema: https://json-schema.org/draft/2020-12/schema
        $id: https://clerk.com/schemas/platform-config/2025-01-01
        type: object
        properties:
          auth_access_control:
            type: object
            description: Access control configuration
            properties:
              allowlist_blocklist_enforced_on_sign_in:
                type: boolean
                description: Whether allowlist/blocklist restrictions are also enforced during sign-in
                default: false
              allowlist_enabled:
                type: boolean
                description: Whether the allowlist is enabled
                default: false
              block_disposable_email_domains:
                type: boolean
                description: Whether to block disposable email domains
                default: false
              block_email_subaddresses:
                type: boolean
                description: Whether to block email subaddresses (plus addressing)
                default: false
              blocklist_enabled:
                type: boolean
                description: Whether the blocklist is enabled
                default: false
              sign_up_mode:
                type: string
                description: Sign-up mode
                default: public
                enum:
                  - public
                  - restricted
                  - waitlist
          auth_attack_protection:
            type: object
            description: Attack protection configuration
            properties:
              bot_protection:
                type: object
                description: Bot protection settings
                properties:
                  captcha_enabled:
                    type: boolean
                    description: Whether CAPTCHA is enabled for sign-up
                    default: true
                  captcha_widget_type:
                    type: string
                    description: CAPTCHA widget type
                    default: smart
                    enum:
                      - smart
                      - invisible
              email_link_require_same_client:
                type: boolean
                description: Whether email links must be opened from the same client
                default: true
              enumeration_protection:
                type: string
                description: Enumeration protection level
                default: bulk
                enum:
                  - bulk
                  - strict
              pii_protection_enabled:
                type: boolean
                description: Whether PII protection is enabled
                default: true
              user_lockout:
                type: object
                description: User lockout settings
                properties:
                  duration_in_minutes:
                    type: integer
                    description: Lockout duration in minutes (0 = indefinite)
                    default: 60
                    minimum: 0
                    maximum: 525600
                  enabled:
                    type: boolean
                    description: Whether user lockout is enabled
                    default: true
                  max_attempts:
                    type: integer
                    description: Maximum failed attempts before lockout
                    default: 100
                    minimum: 1
                    maximum: 999
          auth_email:
            type: object
            description: Email authentication configuration
            properties:
              immutable:
                type: boolean
                description: When enabled, users cannot change their email address after sign-up
                default: false
              required_for_sign_up:
                type: boolean
                description: Whether email address is required for sign-up
                default: false
              sign_in_strategies:
                type: array
                description: Strategies available for sign-in via email
                items:
                  type: string
                  enum:
                    - email_code
                    - email_link
              used_for_sign_in:
                type: boolean
                description: Whether email address is used for sign-in
                default: false
              used_for_sign_up:
                type: boolean
                description: Whether email address is used for sign-up
                default: false
              verification_strategies:
                type: array
                description: Strategies available for email verification
                items:
                  type: string
                  enum:
                    - email_code
                    - email_link
              verify_at_sign_up:
                type: boolean
                description: Whether email address must be verified at sign-up
                default: false
          auth_multi_factor:
            type: object
            description: Multi-factor authentication configuration
            properties:
              authenticator_app:
                type: object
                description: Authenticator app settings
                properties:
                  enabled:
                    type: boolean
                    description: Whether authenticator app is enabled
                    default: false
              backup_code:
                type: object
                description: Backup code settings
                properties:
                  enabled:
                    type: boolean
                    description: Whether backup codes are enabled
                    default: false
              required_for_sign_in:
                type: boolean
                description: Whether MFA is required on sign-in
                default: false
              required_for_sign_up:
                type: boolean
                description: Whether MFA is required on sign-up
                default: false
          auth_passkey:
            type: object
            description: Passkey authentication configuration
            properties:
              allow_autofill:
                type: boolean
                description: Whether passkey options appear in autofill UI
                default: true
              show_sign_in_button:
                type: boolean
                description: Whether a dedicated passkey sign-in button is displayed
                default: true
              used_for_sign_in:
                type: boolean
                description: Whether passkey authentication is enabled for sign-in
                default: false
          auth_password:
            type: object
            description: Password authentication configuration
            properties:
              device_trust:
                type: object
                description: When signing in with a password on a new client (e.g. device), users will always be challenged for a second factor.
                properties:
                  enabled:
                    type: boolean
                    description: Whether device trust is enabled for this instance
                    default: true
              disable_hibp:
                type: boolean
                description: Whether to disable Have I Been Pwned check
                default: false
              enabled:
                type: boolean
                description: Whether password authentication is enabled
                default: false
              enforce_hibp_on_sign_in:
                type: boolean
                description: Whether to enforce HIBP check on sign-in (not just sign-up)
                default: false
              max_length:
                type: integer
                description: 'Maximum password length (0 means use default of 72, valid explicit values: 8-72)'
                default: 72
                minimum: 0
                maximum: 72
              min_length:
                type: integer
                description: 'Minimum password length (0 means use default of 8, valid explicit values: 8-72)'
                default: 8
                minimum: 0
                maximum: 72
              min_zxcvbn_strength:
                type: integer
                description: Minimum zxcvbn password strength score (0-4)
                default: 0
                minimum: 0
                maximum: 4
              require_lowercase:
                type: boolean
                description: Whether password must contain lowercase letters
                default: false
              require_numbers:
                type: boolean
                description: Whether password must contain numbers
                default: false
              require_special_char:
                type: boolean
                description: Whether password must contain special characters
                default: false
              require_uppercase:
                type: boolean
                description: Whether password must contain uppercase letters
                default: false
              required:
                type: boolean
                description: Whether password is required for sign-up
                default: false
              show_zxcvbn:
                type: boolean
                description: Whether to show password strength indicator
                default: false
          auth_phone:
            type: object
            description: Phone authentication configuration
            properties:
              immutable:
                type: boolean
                description: When enabled, users cannot change their phone number after sign-up
                default: false
              required_for_sign_up:
                type: boolean
                description: Whether phone number is required for sign-up
                default: false
              second_factor_strategies:
                type: array
                description: Strategies available for phone second factor
                items:
                  type: string
                  enum:
                    - phone_code
              sign_in_strategies:
                type: array
                description: Strategies available for sign-in via phone
                items:
                  type: string
                  enum:
                    - phone_code
              used_for_second_factor:
                type: boolean
                description: Whether phone number is used for second factor
                default: false
              used_for_sign_in:
                type: boolean
                description: Whether phone number is used for sign-in
                default: false
              used_for_sign_up:
                type: boolean
                description: Whether phone number is used for sign-up
                default: false
              verification_strategies:
                type: array
                description: Strategies available for phone verification
                items:
                  type: string
                  enum:
                    - phone_code
              verify_at_sign_up:
                type: boolean
                description: Whether phone number must be verified at sign-up
                default: false
          auth_username:
            type: object
            description: Username authentication configuration
            properties:
              allow_extended_special_characters:
                type: boolean
                description: Whether to allow extended special characters (^$. !`#+'~) in usernames beyond the default (-_)
                default: false
              allow_numeric_usernames:
                type: boolean
                description: Whether to allow usernames that contain only digits. When enabled, phone-number inputs must be provided in explicit E.164 format.
                default: false
              immutable:
                type: boolean
                description: When enabled, users cannot change their username after sign-up
                default: false
              max_length:
                type: integer
                description: Maximum username length
                default: 64
                minimum: 1
                maximum: 64
              min_length:
                type: integer
                description: Minimum username length
                default: 4
                minimum: 1
                maximum: 64
              required_for_sign_up:
                type: boolean
                description: Whether username is required for sign-up
                default: false
              used_for_sign_in:
                type: boolean
                description: Whether username is used for sign-in
                default: false
              used_for_sign_up:
                type: boolean
                description: Whether username is used for sign-up
                default: false
          auth_web3:
            type: object
            description: Web3 wallet authentication configuration
            properties:
              required_for_sign_up:
                type: boolean
                description: Whether web3 wallet is required for sign-up
                default: false
              sign_in_strategies:
                type: array
                description: Strategies available for sign-in via web3 wallet
                items:
                  type: string
                  enum:
                    - web3_base_signature
                    - web3_coinbase_wallet_signature
                    - web3_metamask_signature
                    - web3_okx_wallet_signature
                    - web3_solana_signature
              used_for_sign_in:
                type: boolean
                description: Whether web3 wallet is used for sign-in
                default: false
              used_for_sign_up:
                type: boolean
                description: Whether web3 wallet is used for sign-up
                default: false
              verification_strategies:
                type: array
                description: Strategies available for web3 wallet verification
                items:
                  type: string
                  enum:
                    - web3_base_signature
                    - web3_coinbase_wallet_signature
                    - web3_metamask_signature
                    - web3_okx_wallet_signature
                    - web3_solana_signature
              verify_at_sign_up:
                type: boolean
                description: Whether web3 wallet must be verified at sign-up
                default: false
          billing:
            type: object
            description: Billing configuration
            properties:
              features:
                type: object
                description: Billable features keyed by slug
                properties:
                  '*':
                    type: object
                    description: Feature configuration
                    properties:
                      avatar_url:
                        type: string
                        description: Feature avatar URL
                      description:
                        type: string
                        description: Feature description
                      include_in_jwt:
                        type: boolean
                        description: Whether the feature is included in session JWTs
                        default: true
                      jwt_value:
                        type: string
                        description: Optional custom value included in JWT claims
                      name:
                        type: string
                        description: Feature display name
                      publicly_visible:
                        type: boolean
                        description: Whether the feature is visible to end users
                        default: false
              free_trial_requires_payment_method:
                type: boolean
                description: Require payment method for free trials
                default: true
              organization_enabled:
                type: boolean
                description: Enable billing for organizations. When enabled, a default free plan (free_org) is created automatically. Requires organizations to be enabled on the instance.
                default: false
              plans:
                type: object
                description: Subscription plans keyed by slug
                properties:
                  '*':
                    type: object
                    description: Subscription plan configuration
                    properties:
                      amount:
                        type: integer
                        description: Monthly price in cents
                        default: 0
                      annual_monthly_amount:
                        type: integer
                        description: Monthly equivalent when billed annually, in cents
                        default: 0
                      currency:
                        type: string
                        description: Currency code (e.g. usd)
                      description:
                        type: string
                        description: Plan description
                      features:
                        type: array
                        description: Feature slugs attached to this plan, in display order. Empty array clears all features; omit to leave attachments unchanged.
                        items:
                          type: string
                      free_trial_days:
                        type: integer
                        description: Number of free trial days
                        default: 0
                      free_trial_enabled:
                        type: boolean
                        description: Whether free trial is available
                        default: false
                      is_recurring:
                        type: boolean
                        description: Whether plan is subscription-based
                        default: true
                      name:
                        type: string
                        description: Plan display name
                      payer_type:
                        type: string
                        description: 'Who pays: user or org. Must match an enabled billing type (user_enabled or organization_enabled).'
                      publicly_visible:
                        type: boolean
                        description: Whether plan is visible to end users
                        default: true
              user_enabled:
                type: boolean
                description: Enable billing for users. When enabled, a default free plan (free_user) is created automatically.
                default: false
          branding:
            type: object
            description: Branding configuration
            properties:
              favicon:
                type: string
                description: Source URL for the application favicon (not yet implemented)
              logo:
                type: string
                description: Source URL for the application logo (not yet implemented)
              show_clerk_branding:
                type: boolean
                description: Whether to show Clerk branding in components
                default: true
          compliance:
            type: object
            description: Compliance configuration
            properties:
              legal_consent:
                type: object
                description: Legal consent configuration
                properties:
                  enabled:
                    type: boolean
                    description: Whether legal consent is required during sign-up
                    default: false
                  privacy_policy_url:
                    type: string
                    description: URL to the privacy policy
                  terms_of_service_url:
                    type: string
                    description: URL to the terms of service
          connection_oauth_apple:
            type: object
            description: Apple OAuth SSO connection configuration
            properties:
              authenticatable:
                type: boolean
                description: Whether users can sign in or sign up using Apple OAuth
                default: true
              block_email_subaddresses:
                type: boolean
                description: Whether to block sign-in/sign-up for accounts with email subaddresses (plus addressing)
                default: false
              bundle_id:
                type: string
                description: iOS app Bundle ID for native Sign in with Apple (optional)
              client_id:
                type: string
                description: Apple Services ID (e.g., com.example.app) (not required in development — Clerk provides shared credentials)
              client_secret:
                type: string
                description: Apple OAuth client secret (not required in development — Clerk provides shared credentials)
                minLength: 1
                x-clerk-sensitive: true
              enabled:
                type: boolean
                description: Whether Apple OAuth is enabled for this instance
                default: false
              key_id:
                type: string
                description: Apple Key ID from the Apple Developer portal
                minLength: 1
              team_id:
                type: string
                description: Apple Team ID from the Apple Developer portal
                minLength: 1
