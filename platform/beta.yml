                type: integer
                description: Maximum verified domains per organization.
                default: 10
                readOnly: true
                minimum: 0
                maximum: 2147483647
              max_allowed_memberships:
                type: integer
                description: Maximum members per organization (0 = unlimited)
                default: 0
                minimum: 0
                maximum: 2147483647
              max_allowed_roles:
                type: integer
                description: Maximum custom roles allowed per instance.
                default: 10
                readOnly: true
                minimum: 0
                maximum: 2147483647
              max_role_sets_allowed:
                type: integer
                description: Maximum role sets allowed per instance.
                default: 30
                readOnly: true
                minimum: 0
                maximum: 2147483647
